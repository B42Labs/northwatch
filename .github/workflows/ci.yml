name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run tests
        run: |
          COVERPKGS=$(go list ./internal/... | grep -v '/ovsdb/nb$' | grep -v '/ovsdb/sb$' | paste -sd, -)
          go test -v -coverprofile=coverage.out -coverpkg="$COVERPKGS" ./...
      - name: Check coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${total}%"
          threshold=70
          if [ "$(echo "$total < $threshold" | bc -l)" -eq 1 ]; then
            echo "Coverage ${total}% is below threshold ${threshold}%"
            exit 1
          fi

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o bin/northwatch-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/northwatch/
      - name: Ad-hoc sign macOS binary
        if: matrix.goos == 'darwin'
        run: codesign -s - bin/northwatch-${{ matrix.goos }}-${{ matrix.goarch }}
      - uses: actions/upload-artifact@v6
        with:
          name: northwatch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/northwatch-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  vuln:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
        continue-on-error: true
